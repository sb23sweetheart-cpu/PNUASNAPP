<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0F1117" />
    <meta name="description" content="PNU ASN — School Management System" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PNU ASN" />

    <link rel="icon" href="%PUBLIC_URL%/logo.png" />

    <title>PNU ASN</title>

    <style>
      #splash {
        position: fixed; inset: 0;
        background: linear-gradient(160deg, #0F1117 0%, #1E3A8A 55%, #0EA5E9 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.45s ease, visibility 0.45s ease;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      #splash .logo-img {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(255,255,255,0.25);
        box-shadow: 0 0 40px rgba(59,130,246,0.5), 0 0 80px rgba(14,165,233,0.25);
        animation: pulse 1.8s ease-in-out infinite;
      }

      #splash h1 {
        color: #fff;
        font-size: 26px;
        font-weight: 800;
        margin-top: 18px;
        letter-spacing: -0.5px;
        text-align: center;
        line-height: 1.3;
      }
      #splash .school-name {
        color: rgba(255,255,255,0.55);
        font-size: 12px;
        margin-top: 6px;
        text-align: center;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 0 32px;
        line-height: 1.5;
      }
      #splash .dots { display: flex; gap: 8px; margin-top: 48px; }
      #splash .dot  { width: 8px; height: 8px; border-radius: 50%; background: rgba(59,130,246,0.8); animation: bounce 1.2s ease-in-out infinite; }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse  { 0%,100% { transform: scale(1); box-shadow: 0 0 40px rgba(59,130,246,0.5); } 50% { transform: scale(1.06); box-shadow: 0 0 60px rgba(59,130,246,0.8); } }
      @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-10px); opacity: 1; } }

      body { background: #0F1117; }
    </style>
  </head>
  <body>
    <div id="splash">
      <img class="logo-img" src="%PUBLIC_URL%/logo.png" alt="PNU ASN Logo" />
      <h1>PNU ASN</h1>
      <div class="school-name">P.N.U.A.S.N. Mat. Hr. Sec. School · Madurai</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const observer = new MutationObserver(function () {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            setTimeout(function () {
              const splash = document.getElementById('splash');
              if (splash) splash.classList.add('hidden');
            }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
